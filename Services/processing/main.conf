# ─────────────────────────────────────────────────────────────────────────────
# LOGSTASH PIPELINE: main.conf
#
# Flow: Beats (Filebeat) → [parse + enrich] → Elasticsearch
# Each section is clearly separated so you can add new inputs/filters/outputs.
# ─────────────────────────────────────────────────────────────────────────────

# ─── INPUT ────────────────────────────────────────────────────────────────────
input {
  # Receive logs from Filebeat agents
  beats {
    port => 5044
    ssl  => false  # Enable with cert in production
  }

  # Also accept direct JSON over TCP (useful for app-level shipping)
  tcp {
    port  => 5000
    codec => json_lines
    tags  => ["direct_tcp"]
  }
}

# ─── FILTER ───────────────────────────────────────────────────────────────────
filter {

  # ── Step 1: Parse raw JSON log lines ────────────────────────────────────────
  # Many apps (Winston, structlog) emit newline-delimited JSON.
  # If the message field IS JSON, parse it into top-level fields.
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "parsed"          # Avoid polluting root namespace
    }
    # Promote important parsed fields to root
    mutate {
      rename => {
        "[parsed][level]"       => "level"
        "[parsed][service]"     => "service"
        "[parsed][trace_id]"    => "trace_id"
        "[parsed][user_id]"     => "user_id"
        "[parsed][message]"     => "log_message"
        "[parsed][timestamp]"   => "app_timestamp"
        "[parsed][duration_ms]" => "duration_ms"
        "[parsed][status_code]" => "status_code"
        "[parsed][path]"        => "request_path"
        "[parsed][method]"      => "http_method"
        "[parsed][error]"       => "error_message"
        "[parsed][stack]"       => "stack_trace"
      }
      remove_field => ["parsed"]
    }
  }

  # ── Step 2: Normalize log levels ────────────────────────────────────────────
  # Different libraries use different case: ERROR, error, Error → normalize to
  # uppercase so ES queries are consistent.
  if [level] {
    mutate {
      uppercase => ["level"]
    }
  }

  # Map level strings to numeric severity (useful for range queries)
  if [level] == "DEBUG"    { mutate { add_field => { "severity" => 10 } } }
  if [level] == "INFO"     { mutate { add_field => { "severity" => 20 } } }
  if [level] == "WARNING"  { mutate { add_field => { "severity" => 30 } } }
  if [level] == "WARN"     { mutate { add_field => { "severity" => 30 } } }
  if [level] == "ERROR"    { mutate { add_field => { "severity" => 40 } } }
  if [level] == "CRITICAL" { mutate { add_field => { "severity" => 50 } } }

  # ── Step 3: Timestamp handling ──────────────────────────────────────────────
  # If the app supplied its own timestamp, use that (more accurate than
  # when Logstash received the event).
  if [app_timestamp] {
    date {
      match    => ["app_timestamp", "ISO8601", "UNIX_MS"]
      target   => "@timestamp"
      timezone => "UTC"
    }
  }

  # ── Step 4: GeoIP enrichment ─────────────────────────────────────────────────
  # If an IP is present (e.g., from nginx access log), look up location.
  if [client_ip] {
    geoip {
      source => "client_ip"
      target => "geoip"
      fields => ["city_name", "country_name", "location"]
    }
  }

  # ── Step 5: Tag errors for fast alert queries ──────────────────────────────
  if [level] in ["ERROR", "CRITICAL"] {
    mutate {
      add_tag => ["alert_candidate"]
    }
  }

  # ── Step 6: Compute index suffix (daily rotation) ─────────────────────────
  # Produces: logs-myservice-2024.01.15
  # This lets you expire old data by deleting old indices.
  mutate {
    add_field => {
      "[@metadata][index_suffix]" => "%{service}"
    }
  }

  # ── Step 7: Remove noise fields ────────────────────────────────────────────
  mutate {
    remove_field => ["host", "agent", "ecs", "input", "log", "event"]
  }
}

# ─── OUTPUT ───────────────────────────────────────────────────────────────────
output {
  # ── Primary: Elasticsearch ──────────────────────────────────────────────────
  elasticsearch {
    hosts => ["${ES_HOST:http://elasticsearch:9200}"]

    # Dynamic index name: logs-<service>-<YYYY.MM.dd>
    index => "logs-%{[@metadata][index_suffix]}-%{+YYYY.MM.dd}"

    # ILM policy applied at index creation (Phase 10: configure lifecycle)
    ilm_rollover_alias => "logs"
    ilm_pattern        => "000001"
    ilm_policy         => "logs-policy"

    # Retry on failure (ES may be briefly unavailable during deploys)
    retry_on_conflict => 3
  }

  # ── Debug (only in dev — comment out in prod) ───────────────────────────────
  # stdout { codec => rubydebug }
}